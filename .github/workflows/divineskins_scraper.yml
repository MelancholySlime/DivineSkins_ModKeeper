name: DivineSkins Auto Scraper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Chạy thủ công bất kỳ lúc nào

jobs:
  scrape-ds-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          sparse-checkout: |
            .github
            _divineskins_scraped.json
            _divineskins_files.json
          sparse-checkout-cone-mode: false
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run DivineSkins Scraper
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_DIVINESKINS_SCRAPER_SCRIPT: ${{ secrets.NEW_DIVINESKINS_SCRAPER_SCRIPT }}
        run: |
          echo "ds_auto.py" >> .gitignore
          python -c "import os; open('ds_auto.py', 'w', encoding='utf-8').write(os.environ['NEW_DIVINESKINS_SCRAPER_SCRIPT'])"
          python ds_auto.py
          rm ds_auto.py
